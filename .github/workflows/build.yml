name: Build Profiles

on:
  push:
    paths:
      - "profiles/**.json"
      - "assets/**"
      - "template.html"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build profile pages
        run: python build.py

      - name: Commit and push built pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add user/ index.html
          git diff --staged --quiet || git commit -m "Build profile pages"
          git push
